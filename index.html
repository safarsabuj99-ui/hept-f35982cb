<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HEPT — Automate Your Ad Agency. Scale Your Clients.</title>
    <meta name="description" content="HEPT automates ad spend reporting, client billing, and profit analytics for media-buying agencies. Manage 50+ clients as easily as 5 across Meta, TikTok, and Google." />
    <meta name="author" content="HEPT" />
    <link rel="canonical" href="https://heptbd.com/" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HEPT" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Manifest is injected at runtime from src/main.tsx so we can skip it on Lovable preview hosts where /manifest.json returns 401 and triggers reload loops. -->

    <!-- Tiny critical CSS: just background color to prevent FOUC. No duplicate hero markup. -->
    <style>
      html,body{margin:0;padding:0;background:#09090b;color:#fafafa;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
    </style>

    <!-- Async font load (non-render-blocking via media swap) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>

    <meta property="og:title" content="HEPT — Automate Your Ad Agency. Scale Your Clients." />
    <meta property="og:description" content="Automate ad spend reporting, client billing & profit analytics for Meta, TikTok and Google." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://heptbd.com/" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
